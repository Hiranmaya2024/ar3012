<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Aaradhya Pharmaceuticals - Order Dashboard</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
padding:20px;
}

.header{
font-size:26px;
font-weight:bold;
margin-bottom:20px;
}

.stats{
display:flex;
gap:20px;
margin-bottom:20px;
flex-wrap:wrap;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 8px rgba(0,0,0,0.1);
min-width:200px;
}

.card h3{
margin:0;
font-size:14px;
color:#888;
}

.card h2{
margin:5px 0 0 0;
}

.search{
padding:10px;
width:300px;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:left;
}

th{
background:#2c3e50;
color:white;
}

</style>

</head>

<body>

<div class="header">
📊 Aaradhya Pharmaceuticals Order Dashboard
</div>

<div class="stats">

<div class="card">
<h3>Total Orders</h3>
<h2 id="totalOrders">0</h2>
</div>

<div class="card">
<h3>Total Sales</h3>
<h2 id="totalSales">₹0</h2>
</div>

</div>

<input class="search" placeholder="Search Shop / Mobile..." onkeyup="searchOrders(this.value)">

<table>

<thead>

<tr>
<th>OrderID</th>
<th>Date</th>
<th>Shop</th>
<th>Mobile</th>
<th>Item</th>
<th>Qty</th>
<th>Rate</th>
<th>LineTotal</th>
<th>OrderTotal</th>
</tr>

</thead>

<tbody id="tableBody">

</tbody>

</table>

<script>

const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQjkW5XHuvf8ocW1devsrfnMxAhEoYL1p_wkHFjXNleB_GHfLaqO3nrZi6ZqMh3DvzJE6Krrk3L3kk0/pub?gid=0&single=true&output=csv"

let orders=[]

async function loadOrders(){

let res = await fetch(sheetURL)
let data = await res.text()

let rows = data.split("\n").slice(1)

orders = rows.map(r => r.split(","))

renderTable(orders)
calculateStats()

}

function renderTable(data){

let html=""

data.forEach(o=>{

if(o.length<8) return

html+=`
<tr>
<td>${o[0]}</td>
<td>${o[1]}</td>
<td>${o[2]}</td>
<td>${o[3]}</td>
<td>${o[4]}</td>
<td>${o[5]}</td>
<td>${o[6]}</td>
<td>${o[7]}</td>
<td>${o[8]}</td>
</tr>
`

})

document.getElementById("tableBody").innerHTML=html

}

function calculateStats(){

document.getElementById("totalOrders").innerText = orders.length

let total=0

orders.forEach(o=>{
total += parseFloat(o[8] || 0)
})

document.getElementById("totalSales").innerText = "₹"+total.toLocaleString()

}

function searchOrders(q){

q=q.toLowerCase()

let filtered = orders.filter(o => 
(o[2] && o[2].toLowerCase().includes(q)) ||
(o[3] && o[3].toLowerCase().includes(q))
)

renderTable(filtered)

}

loadOrders()

</script>

</body>
</html>
