<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Aaradhya Pharma Order Dashboard</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
padding:20px;
}

.header{
font-size:24px;
font-weight:bold;
margin-bottom:20px;
}

.orderCard{

background:white;
border-radius:12px;
padding:20px;
margin-bottom:20px;

box-shadow:0 4px 10px rgba(0,0,0,0.1);

}

.orderHeader{

display:flex;
justify-content:space-between;
margin-bottom:10px;

}

.orderNumber{

font-size:18px;
font-weight:bold;

}

.shop{

color:#555;

}

.items{

margin-top:10px;

}

.itemRow{

display:flex;
justify-content:space-between;

padding:8px 0;

border-bottom:1px solid #eee;

}

.total{

margin-top:10px;
font-weight:bold;
font-size:16px;

}

.search{
padding:10px;
width:300px;
margin-bottom:20px;
}

</style>

</head>

<body>

<div class="header">
📦 Aaradhya Pharmaceuticals Order History
</div>

<input class="search" placeholder="Search Shop / Mobile" onkeyup="searchOrders(this.value)">

<div id="ordersContainer"></div>

<script>

const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQjkW5XHuvf8ocW1devsrfnMxAhEoYL1p_wkHFjXNleB_GHfLaqO3nrZi6ZqMh3DvzJE6Krrk3L3kk0/pub?gid=0&single=true&output=csv"

let groupedOrders = []

async function loadOrders(){

let res = await fetch(sheetURL)
let csv = await res.text()

let rows = csv.split("\n").slice(1)

let orders={}

rows.forEach(r=>{

let c = r.split(",")

let orderId = c[0]

if(!orders[orderId]){

orders[orderId]={

orderId:c[0],
date:c[1],
shop:c[2],
mobile:c[3],
items:[],
total:c[8]

}

}

orders[orderId].items.push({

item:c[4],
qty:c[5],
rate:c[6],
lineTotal:c[7]

})

})

groupedOrders = Object.values(orders)

renderOrders(groupedOrders)

}

function renderOrders(data){

let container=document.getElementById("ordersContainer")

let html=""

data.forEach(o=>{

html+=`

<div class="orderCard">

<div class="orderHeader">

<div>

<div class="orderNumber">Order #${o.orderId}</div>
<div class="shop">${o.shop} | ${o.mobile}</div>
<div>${o.date}</div>

</div>

</div>

<div class="items">

`

o.items.forEach(i=>{

html+=`

<div class="itemRow">

<div>${i.item}</div>

<div>
${i.qty} × ₹${i.rate} = ₹${i.lineTotal}
</div>

</div>

`

})

html+=`

</div>

<div class="total">

Order Total: ₹${o.total}

</div>

</div>

`

})

container.innerHTML=html

}

function searchOrders(q){

q=q.toLowerCase()

let filtered = groupedOrders.filter(o =>
o.shop.toLowerCase().includes(q) ||
o.mobile.includes(q)
)

renderOrders(filtered)

}

loadOrders()

</script>

</body>
</html>
